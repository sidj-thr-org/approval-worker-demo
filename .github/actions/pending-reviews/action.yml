name: Pending Reviews
description: >
  Checks PR approval requirements across three reviewer roles and posts a commit
  status to the PR head SHA plus an informational PR comment.

inputs:
  github-token:
    description: >
      PAT with read:org (for team membership lookups) and repo scope
      (for commit statuses and PR comments).
    required: true
  pr-number:
    description: PR number to check
    required: true
  head-sha:
    description: PR head SHA to post the commit status on. Optional — skipped when not available (e.g. issue_comment trigger).
    required: false
  maintainers-github-team:
    description: >
      GitHub team slug for maintainer approvers (e.g. managers).
      Used for urgent or escalated merges.
    required: true
  team-leads-github-team:
    description: >
      GitHub team slug for team lead approvers.
      Primary reviewers whose approval is required to merge.
    required: true
  members-github-team:
    description: >
      GitHub team slug for member approvers (e.g. developers).
      Peer reviewers who count towards the approval requirement.
    required: true

runs:
  using: node24
  main: dist/index.js
